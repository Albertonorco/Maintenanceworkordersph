<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0f1117"/>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13161e"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
  </defs>
  <!-- Orange accent bar at top -->
  <rect x="0" y="0" width="512" height="8" rx="4" fill="#f5a623"/>
  <!-- Gear icon -->
  <text x="256" y="300" font-size="220" text-anchor="middle" fill="#f5a623" font-family="Arial">⚙</text>
  <!-- Bottom label -->
  <rect x="56" y="360" width="400" height="60" rx="12" fill="#f5a623"/>
  <text x="256" y="403" font-size="38" font-weight="900" text-anchor="middle" fill="#000" font-family="Arial" letter-spacing="4">MAINTENANCE</text>
</svg>
